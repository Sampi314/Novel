name: Auto-commit generated content

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Commit message for content update'
        required: false
        default: 'chore: auto-commit generated content'

permissions:
  contents: write

jobs:
  commit-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for changes in data directory
        id: changes
        run: |
          git diff --quiet public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git commit -m "${{ github.event.inputs.message }}"
          git push
